name: CI

on:
  push:
    branches: [ main, release ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    - name: Build for Confluence 9
      run: mvn -B clean package --file pom.xml
    - name: Build for Confluence 10
      run: mvn -B clean package -Pconfluence10 --file pom.xml
