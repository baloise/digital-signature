name: Release

on:
  create:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Get versions
      id: version
      run: |
        C9=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout --file pom.xml)
        echo "C9_VERSION=${C9}" >> $GITHUB_OUTPUT
        echo "C10_VERSION=10.${C9#*.}" >> $GITHUB_OUTPUT

    - name: Build for Confluence 9
      run: mvn -B clean package --file pom.xml

    - name: Save Confluence 9 artifacts
      run: |
        mkdir -p staging
        cp target/digital-signature-${{ steps.version.outputs.C9_VERSION }}.jar staging/
        cp target/digital-signature-${{ steps.version.outputs.C9_VERSION }}.obr staging/

    - name: Set version for Confluence 10
      run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.C10_VERSION }} -DgenerateBackupPoms=false

    - name: Build for Confluence 10
      run: mvn -B clean package -Pconfluence10 --file pom.xml

    - name: Save Confluence 10 artifacts
      run: |
        cp target/digital-signature-${{ steps.version.outputs.C10_VERSION }}.jar staging/
        cp target/digital-signature-${{ steps.version.outputs.C10_VERSION }}.obr staging/

    - name: Release using Github CLI
      run: |
        C9=${{ steps.version.outputs.C9_VERSION }}
        C10=${{ steps.version.outputs.C10_VERSION }}
        gh release create ${GITHUB_REF##*/} \
          ./staging/digital-signature-${C9}.jar \
          ./staging/digital-signature-${C9}.obr \
          ./staging/digital-signature-${C10}.jar \
          ./staging/digital-signature-${C10}.obr \
          -t "Release ${GITHUB_REF##*/} (Confluence 9: ${C9}, Confluence 10: ${C10})"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Prepare Confluence 9 gh-pages folder
      run: |
        mkdir c9-deploy
        cp staging/digital-signature-${{ steps.version.outputs.C9_VERSION }}.jar c9-deploy/
        cp staging/digital-signature-${{ steps.version.outputs.C9_VERSION }}.obr c9-deploy/

    - name: Deploy Confluence 9 to gh-pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: gh-pages
        folder: c9-deploy
        clean: true
        target-folder: ${{ steps.version.outputs.C9_VERSION }}
        commit-message: Release ${{ steps.version.outputs.C9_VERSION }}

    - name: Prepare Confluence 10 gh-pages folder
      run: |
        mkdir c10-deploy
        cp staging/digital-signature-${{ steps.version.outputs.C10_VERSION }}.jar c10-deploy/
        cp staging/digital-signature-${{ steps.version.outputs.C10_VERSION }}.obr c10-deploy/

    - name: Deploy Confluence 10 to gh-pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: gh-pages
        folder: c10-deploy
        clean: true
        target-folder: ${{ steps.version.outputs.C10_VERSION }}
        commit-message: Release ${{ steps.version.outputs.C10_VERSION }}
